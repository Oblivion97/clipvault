name: clipvault
base: core22
version: "1.0.0"
summary: Windows-style clipboard history for Linux (Win+V)
description: |
  ClipVault brings the Windows clipboard history experience to Linux.
  Press Win+V to open a searchable popup of everything you have copied —
  text, links, code snippets and images — then click or Enter to paste.

  Features:
  - Win+V opens clipboard history from anywhere
  - Stores up to 200 items persistently
  - Wayland and X11 support
  - Auto-starts at login

grade: stable
confinement: classic   # classic needed for global hotkey + clipboard access

architectures:
  - build-on: amd64
  - build-on: arm64

apps:
  clipvault:
    command: bin/clipvault
    daemon: simple
    restart-condition: always
    environment:
      PYTHONPATH: $SNAP/lib/python3.10/site-packages

parts:
  clipvault:
    plugin: python
    source: .
    python-packages:
      - pynput
      - pillow
    stage-packages:
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - xdotool
      - wl-clipboard
    override-build: |
      craftctl default
      # Install main script as executable
      install -Dm755 clipvault.py $CRAFT_PART_INSTALL/bin/clipvault
      # Install icon
      install -Dm644 assets/icon.svg \
        $CRAFT_PART_INSTALL/meta/gui/icon.svg
      # Install desktop file
      install -Dm644 packaging/io.github.clipvault.ClipVault.desktop \
        $CRAFT_PART_INSTALL/meta/gui/clipvault.desktop
