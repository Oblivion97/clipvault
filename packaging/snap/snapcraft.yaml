name: clipvault
base: core22
version: "1.3.0"
summary: Windows-style clipboard history for Linux (Win+V)
description: |
  ClipVault brings the Windows clipboard history experience to Linux.
  Press Win+V to open a searchable popup of everything you have copied —
  text, links, code snippets and images — then click or Enter to paste.

  Features:
  - Win+V opens clipboard history from anywhere
  - Stores up to 200 items persistently
  - Wayland and X11 support
  - Auto-starts at login

grade: stable
confinement: classic

apps:
  clipvault:
    command: bin/run.sh

parts:
  clipvault:
    plugin: nil
    source: .
    build-packages:
      - python3.10
      - python3.10-venv
      - python3-pip
      - python3-gi
      - python3-gi-cairo
      - libgirepository1.0-dev
      - gcc
    stage-packages:
      - python3.10
      - python3.10-venv
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - gir1.2-gdkpixbuf-2.0
      - xdotool
      - wl-clipboard
      - libgtk-3-0
      - libglib2.0-0
    override-build: |
      # Install Python deps into snap
      pip3 install --target=$CRAFT_PART_INSTALL/lib/python pynput pillow

      # Copy main script
      mkdir -p $CRAFT_PART_INSTALL/bin
      cp clipvault.py $CRAFT_PART_INSTALL/bin/clipvault.py

      # Create launcher script that sets PYTHONPATH
      cat > $CRAFT_PART_INSTALL/bin/run.sh << 'SCRIPT'
      #!/bin/bash
      export PYTHONPATH=$SNAP/lib/python:$PYTHONPATH
      exec python3 $SNAP/bin/clipvault.py "$@"
      SCRIPT
      chmod +x $CRAFT_PART_INSTALL/bin/run.sh

      # Icon and desktop file
      mkdir -p $CRAFT_PART_INSTALL/meta/gui
      cp assets/icon.svg $CRAFT_PART_INSTALL/meta/gui/icon.svg
      cp packaging/io.github.clipvault.ClipVault.desktop \
         $CRAFT_PART_INSTALL/meta/gui/clipvault.desktop
