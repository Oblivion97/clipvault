<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#1a1a1a"/>

  <!-- Clipboard body -->
  <rect x="28" y="30" width="72" height="82" rx="8" fill="#ffffff"/>

  <!-- Clipboard clip at top -->
  <rect x="48" y="22" width="32" height="16" rx="5" fill="#cccccc"/>
  <rect x="54" y="18" width="20" height="12" rx="4" fill="#1a1a1a"/>

  <!-- History lines -->
  <rect x="40" y="52" width="48" height="5" rx="2.5" fill="#333333"/>
  <rect x="40" y="64" width="40" height="5" rx="2.5" fill="#333333"/>
  <rect x="40" y="76" width="44" height="5" rx="2.5" fill="#333333"/>

  <!-- Clock circle (bottom right) -->
  <circle cx="88" cy="96" r="18" fill="#1a1a1a"/>
  <circle cx="88" cy="96" r="15" fill="#ffffff"/>
  <!-- Clock hands -->
  <line x1="88" y1="96" x2="88" y2="85" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="96" x2="95" y2="101" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="88" cy="96" r="2" fill="#1a1a1a"/>
</svg>
